<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #00ff88;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 { font-size: 1.5rem; margin-bottom: 30px; }

        .links-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            text-decoration: none;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 16px;
        }

        .link-card:hover {
            background: #00ff88;
            color: #121212;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        /* --- SESSÃO SECRETA E ANIMAÇÕES --- */
        
        @keyframes fadeInSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sessao-secreta {
            display: none; /* Ativado via JS */
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
            padding: 15px;
            border: 1px dashed #00ff88;
            border-radius: 8px;
            background: #1a1a1a;
            animation: fadeInSlide 0.4s ease-out forwards;
        }

        .link-secreto {
            background: #00ff8822;
            border: 1px solid #00ff88;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
            font-size: 14px;
            transition: background 0.3s;
        }

        .link-secreto:hover {
            background: #00ff8844;
        }

        .senha-container {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
            animation: fadeInSlide 0.3s ease-out;
        }

        input {
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #222;
            color: white;
            text-align: center;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #00ff88;
        }

        button.btn-entrar {
            background: #00ff88;
            color: #121212;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button.btn-entrar:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <img src="https://github.com/identicons/user.png" alt="Foto de Perfil" class="profile-pic">
    <h1>Meus Links</h1>

    <div class="links-container">
        <a href="https://www.instagram.com/acarllos_/" class="link-card" target="_blank">Instagram Principal</a>
        <a href="https://www.instagram.com/artheruth/" class="link-card" target="_blank">Instagram Secundário</a>
        <a href="mailto:abitticarlos@gmail.com" class="link-card" target="_blank">E-mail</a>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <div class="link-card" onclick="toggleFormSenha()">Aba Restrita 🔒</div>
            
            <div id="form-senha" class="senha-container">
                <input type="password" id="input-senha" placeholder="Digite a senha">
                <button class="btn-entrar" onclick="validarAcesso()">Desbloquear Conteúdo</button>
            </div>

            <div id="conteudo-secreto" class="sessao-secreta">
                <p style="text-align: center; font-size: 12px; color: #00ff88; margin-top: 0;">🔓 Acesso Liberado</p>
                <a href="https://1drv.ms/v/c/b7955fde53ea9d7d/IQAFRVFqObE8Qbq9HuiuFvvAAef_-IXJf_fXBI5z_JANiRg?e=kzTWqQ" target="_blank" class="link-secreto">Campo Pedro 1</a>
                <a href="https://1drv.ms/f/c/b7955fde53ea9d7d/IgCls_cXebWVSLDpN2thj01RARlftsVRmdGnHE1qyyLS2aQ?e=p0VSzl" target="_blank" class="link-secreto">Casamento Sabrina</a>
                <a href="#" class="link-secreto">EM BREVE</a>
                <a href="#" class="link-secreto">EM BREVE</a>
                <a href="#" class="link-secreto">EM BREVE</a>
            </div>
        </div>
    </div>

    <script>
        // Função para mostrar/esconder o formulário de senha
        function toggleFormSenha() {
            const form = document.getElementById('form-senha');
            const conteudo = document.getElementById('conteudo-secreto');
            const input = document.getElementById('input-senha');
            
            // Se o conteúdo já estiver aberto, fecha ele
            if (conteudo.style.display === 'flex') {
                conteudo.style.display = 'none';
            } else {
                // Alterna a exibição do input de senha
                const isVisible = form.style.display === 'flex';
                form.style.display = isVisible ? 'none' : 'flex';
                if (!isVisible) {
                    input.focus(); // Foca no campo automaticamente
                }
            }
        }

        // Função para validar a senha
        function validarAcesso() {
            const input = document.getElementById('input-senha');
            const senhaDigitada = input.value;
            const senhaCorreta = "07020401";
            const conteudo = document.getElementById('conteudo-secreto');
            const form = document.getElementById('form-senha');
            
            if (senhaDigitada === senhaCorreta) {
                form.style.display = 'none'; // Esconde o campo de senha
                conteudo.style.display = 'flex'; // Mostra os links secretos
                input.value = ""; // Limpa o campo
            } else {
                alert("Senha incorreta!");
                input.value = ""; // Limpa o campo para nova tentativa
                input.focus();
            }
        }

        // Adiciona suporte ao botão "Enter" do teclado
        document.getElementById('input-senha').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                validarAcesso();
            }
        });
    </script>

</body>
</html>
