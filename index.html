<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #00ff88;
            margin-bottom: 15px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 30px; }

        .links-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            text-decoration: none;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 16px;
        }

        .link-card:hover {
            background: #00ff88;
            color: #121212;
            transform: scale(1.05);
        }

        /* Estilo para os campos que vão expandir */
        .sessao-secreta {
            display: none; /* Escondido por padrão */
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
            padding: 15px;
            border: 1px dashed #00ff88;
            border-radius: 8px;
            background: #1a1a1a;
        }

        .link-secreto {
            background: #00ff8822;
            border: 1px solid #00ff88;
            color: white;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
            font-size: 14px;
        }

        .senha-container {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
        }

        input {
            padding: 12px;
            border-radius: 5px;
            border: none;
            text-align: center;
            font-size: 16px;
        }

        button.btn-entrar {
            background: #00ff88;
            color: #121212;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <img src="https://github.com/identicons/user.png" alt="Foto" class="profile-pic">
    <h1>Meus Links</h1>

    <div class="links-container">
        
        <a href="https://www.instagram.com/acarllos_/" class="link-card" target="_blank">Instagram Principal</a>
        <a href="https://www.instagram.com/artheruth/" class="link-card" target="_blank">Instagram Secundário</a>
        <a href="mailto:abitticarlos@gmail.com" class="link-card" target="_blank">E-mail</a>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <div class="link-card" onclick="toggleFormSenha()">Aba Restrita 🔒</div>
            
            <div id="form-senha" class="senha-container">
                <input type="password" id="input-senha" placeholder="Digite a senha">
                <button class="btn-entrar" onclick="validarAcesso()">Desbloquear Conteúdo</button>
            </div>

            <div id="conteudo-secreto" class="sessao-secreta">
                <p style="text-align: center; font-size: 12px; color: #00ff88;">🔓 Acesso Liberado</p>
                <a href="https://1drv.ms/v/c/b7955fde53ea9d7d/IQAFRVFqObE8Qbq9HuiuFvvAAef_-IXJf_fXBI5z_JANiRg?e=kzTWqQ" class="link-secreto">Campo Pedro 1</a>
                <a href="https://1drv.ms/f/c/b7955fde53ea9d7d/IgCls_cXebWVSLDpN2thj01RARlftsVRmdGnHE1qyyLS2aQ?e=p0VSzl" class="link-secreto">Casamento Sabrina</a>
                <a href="LINK_3" class="link-secreto"> EM BREVE</a>
                <a href="LINK_4" class="link-secreto"> EM BREVE </a>
                <a href="LINK_5" class="link-secreto"> EM BREVE </a>
            </div>
        </div>

    </div>

    <script>
        // Mostra/Esconde o input de senha
        function toggleFormSenha() {
            const form = document.getElementById('form-senha');
            const conteudo = document.getElementById('conteudo-secreto');
            
            // Se o conteúdo já estiver aberto, ele fecha tudo
            if (conteudo.style.display === 'flex') {
                conteudo.style.display = 'none';
            } else {
                form.style.display = form.style.display === 'flex' ? 'none' : 'flex';
            }
        }

        // Valida a senha e expande os 5 campos
        function validarAcesso() {
            const senhaDigitada = document.getElementById('input-senha').value;
            const senhaCorreta = "07020401";
            
            if (senhaDigitada === senhaCorreta) {
                document.getElementById('form-senha').style.display = 'none'; // Esconde o input
                document.getElementById('conteudo-secreto').style.display = 'flex'; // Abre os 5 campos
            } else {
                alert("Senha incorreta!");
            }
        }
    </script>

</body>
</html>
