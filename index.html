<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links</title>
    <style>
        body {
            background-color: #121212; /* Fundo escuro */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #00ff88;
            margin-bottom: 15px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { color: #888; margin-bottom: 30px; }

        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            text-decoration: none;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .link-card:hover {
            background: #00ff88;
            color: #121212;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <img src="https://github.com/identicons/user.png" alt="Foto de Perfil" class="profile-pic">

    <h1>Meus Links</h1>
    <p>Confira meus conteúdos abaixo 👇</p>

    <div class="links-container">
        <a href="COLOQUE_SEU_LINK_AQUI" class="link-card" target="_blank">Aba Restrita</a>
        <a href="https://instagram.com/seuuser" class="link-card" target="_blank">Instagram</a>
        <a href="https://github.com/seuuser" class="link-card" target="_blank">Meu Portfólio</a>
        <a href="mailto:seuemail@gmail.com" class="link-card" target="_blank">E-mail</a>
    </div>

</body>
</html>
