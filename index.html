<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #00ff88;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 { font-size: 1.5rem; margin-bottom: 30px; }

        .links-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            text-decoration: none;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 16px;
        }

        .link-card:hover {
            background: #00ff88;
            color: #121212;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        /* Animações e Sessão Secreta */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sessao-secreta {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
            padding: 15px;
            border: 1px dashed #00ff88;
            border-radius: 8px;
            background: #1a1a1a;
            animation: fadeIn 0.4s ease-out;
        }

        .link-secreto {
            background: #00ff8822;
            border: 1px solid #00ff88;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
            font-size: 14px;
        }

        .senha-container {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
            animation: fadeIn 0.3s ease-out;
        }

        input {
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #222;
            color: white;
            text-align: center;
            outline: none;
        }

        button.btn-entrar {
            background: #00ff88;
            color: #121212;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <img src="https://github.com/identicons/user.png" alt="Foto" class="profile-pic">
    <h1>Meus Links</h1>

    <div class="links-container">
        <a href="https://www.instagram.com/acarllos_/" class="link-card" target="_blank">Instagram Principal</a>
        <a href="https://www.instagram.com/artheruth/" class="link-card" target="_blank">Instagram Secundário</a>
        <a href="mailto:abitticarlos@gmail.com" class="link-card" target="_blank">E-mail</a>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <div class="link-card" onclick="toggleFormSenha()">Aba Restrita 🔒</div>
            
            <div id="form-senha" class="senha-container">
                <input type="password" id="input-senha" placeholder="Senha de acesso">
                <button class="btn-entrar" onclick="validarAcesso()">Desbloquear</button>
            </div>

            <div id="conteudo-secreto" class="sessao-secreta">
                <p style="text-align: center; font-size: 12px; color: #00ff88;">🔓 Acesso Seguro Liberado</p>
                <a href="https://1drv.ms/v/c/b7955fde53ea9d7d/IQAFRVFqObE8Qbq9HuiuFvvAAef_-IXJf_fXBI5z_JANiRg?e=kzTWqQ" target="_blank" class="link-secreto">Campo Pedro 1</a>
                <a href="https://1drv.ms/f/c/b7955fde53ea9d7d/IgCls_cXebWVSLDpN2thj01RARlftsVRmdGnHE1qyyLS2aQ?e=p0VSzl" target="_blank" class="link-secreto">Casamento Sabrina</a>
                <a href="#" class="link-secreto">EM BREVE</a>
            </div>
        </div>
    </div>

    <script>
        // Função para transformar a senha em Hash (SHA-256)
        async function gerarHash(string) {
            const msgUint8 = new TextEncoder().encode(string);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function toggleFormSenha() {
            const form = document.getElementById('form-senha');
            const conteudo = document.getElementById('conteudo-secreto');
            if (conteudo.style.display === 'flex') {
                conteudo.style.display = 'none';
            } else {
                form.style.display = form.style.display === 'flex' ? 'none' : 'flex';
                if (form.style.display === 'flex') document.getElementById('input-senha').focus();
            }
        }

        async function validarAcesso() {
            const input = document.getElementById('input-senha');
            const senhaDigitada = input.value;
            
            // Esse código longo abaixo é a sua senha "07020401" criptografada.
            // Ninguém consegue saber qual é a senha original olhando isso aqui.
            const hashCorreto = "3e03164993108603610991c01570776778f65492d5276e01a851897f51662973";
            
            const hashDigitado = await gerarHash(senhaDigitada);

            if (hashDigitado === hashCorreto) {
                document.getElementById('form-senha').style.display = 'none';
                document.getElementById('conteudo-secreto').style.display = 'flex';
            } else {
                alert("Acesso Negado!");
                input.value = "";
            }
        }

        document.getElementById('input-senha').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') await validarAcesso();
        });
    </script>
</body>
</html>
